<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title" data-i18n="page-title">智能汇率转换器</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-741630842819679"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <h1 id="app-title" data-i18n="app-title">智能汇率转换器</h1>
            </div>

            <div class="content-area">
                <!-- 智能模式输入区域 -->
                <div class="input-group">
                    <label for="inputAmount" data-i18n="input-label">输入金额（支持自然语言）：</label>
                    <div class="input-wrapper">
                        <input type="text" id="inputAmount" data-i18n-placeholder="input-placeholder"
                            placeholder="例如：234534韩元、234亿美元">
                    </div>
                </div>

                <!-- 目标货币选择 -->
                <div class="input-group">
                    <label for="targetCurrency" data-i18n="target-label">目标货币：</label>
                    <select id="targetCurrency">
                        <!-- JS动态生成 -->
                    </select>
                </div>

                <button id="convertBtn" class="convert-btn">
                    <span data-i18n="convert-btn">开始转换</span>

                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p id="loading-text" data-i18n="loading-text">正在处理中...</p>
                </div>

                <div class="result-container" id="result">
                    <div class="result-header">
                        <h3 data-i18n="result-title">转换结果</h3>
                        <span class="rate-tag">实时汇率</span>
                    </div>
                    <div id="resultText" class="result-grid"></div>
                </div>

                <div class="error" id="error">

                    <span id="errorMessage"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
