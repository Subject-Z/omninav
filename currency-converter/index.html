<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title" data-i18n="page-title">汇率换算</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-741630842819679"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <h1 id="app-title" data-i18n="app-title">汇率换算</h1>
                <div id="lastUpdateTime" class="last-update-time"></div>
            </div>

            <div class="content-area">
                <div class="layout-container">
                    <!-- 源货币区域 -->
                    <div class="input-section">
                        <div class="source-currency-container">
                            <!-- 源货币选择 -->
                            <select id="sourceCurrency">
                                <!-- JS动态生成 -->
                            </select>

                            <!-- 输入框区域 -->
                            <div class="input-fields">
                                <input type="text" id="inputAmount" data-i18n-placeholder="input-placeholder"
                                    placeholder="例如：234534韩元、234亿美元">
                            </div>
                        </div>
                    </div>

                    <!-- 换算按钮 -->
                    <div class="button-section">
                        <button id="convertBtn" class="convert-btn">
                            <span data-i18n="convert-btn">换算</span>
                        </button>
                    </div>

                    <!-- 目标货币和结果区域 -->
                    <div class="target-result-section">
                        <div class="target-currency-container">
                            <!-- 目标货币选择 -->
                            <select id="targetCurrency">
                                <!-- JS动态生成 -->
                            </select>

                            <!-- 结果区域 -->
                            <div class="result-container" id="result">
                                <div id="resultText" class="result-grid">
                                    <!-- 默认显示0的结果 -->
                                    <div class="result-card">
                                        <p class="value">0</p>
                                    </div>
                                    <div class="result-card">
                                        <p class="value">0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
