<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OmniNav - 一站式智能导航平台</title>
  <script>
    // 根据浏览器语言重定向到相应的语言版本
    (function() {
      var userLang = navigator.language || navigator.userLanguage;
      var defaultLang = userLang.startsWith('en') ? 'zh' : 'en';
      
      // 获取基础路径
      var basePath = '';
      
      // 检查是否在GitHub Pages环境下（URL中包含/omninav）
      if (window.location.pathname.includes('/omninav')) {
        basePath = '/omninav';
      }
      
      // 构建完整的重定向路径
      var redirectPath = basePath + '/' + defaultLang + '/';
      
      // 执行重定向
      window.location.replace(redirectPath);
    })();
  </script>
</head>
<body>
  <p style="text-align: center; margin-top: 20%; font-family: sans-serif;">
    正在重定向... | Redirecting...
  </p>
</body>
</html>
